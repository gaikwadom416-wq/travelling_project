<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Vehicles - Driver</title>
    <!-- Load Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <!-- Load Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        /* --- General Theme Styles (Consistent with Dashboard) --- */
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 0;
            color: #ecf0f1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            padding: 40px;
            border-radius: 12px;
            max-width: 800px;
            width: 90%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h2 {
            border-bottom: 2px solid #f39c12; /* Yellow/Accent border */
            padding-bottom: 10px;
            margin-bottom: 30px;
            color: #ffffff;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
            font-size: 2em;
        }
        
        /* --- Vehicle Card Style --- */
        .vehicle-card {
            background: #34495e; /* Darker interior color */
            border-left: 5px solid #3498db; /* Blue for Vehicle list */
            transition: transform 0.2s;
            margin-bottom: 20px;
            color: #ecf0f1;
        }

        .vehicle-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
        }

        .card-body strong {
            color: #ffffff;
            font-weight: 700;
            display: block;
            font-size: 1.3em;
            margin-bottom: 5px;
        }
        
        .card-body small {
            color: #bdc3c7;
            font-size: 1em;
            display: block;
        }
        
        /* --- Back Button Style --- */
        .btn-back-custom {
            background-color: #8e44ad !important;
            border: none;
            color: white !important;
            box-shadow: 0 4px 0 #7c3a96;
            transition: all 0.2s ease;
        }

        .btn-back-custom:hover {
            background-color: #7c3a96 !important;
            box-shadow: 0 2px 0 #7c3a96;
            transform: translateY(1px);
        }
    </style>
</head>
<body>

<div class="container py-4">
    <a href="{{ url_for('driver_dashboard') }}" class="btn btn-primary btn-back-custom mb-4">
        <i class="fas fa-arrow-left"></i> Back to Driver Dashboard
    </a>

    <h2 class="text-warning mb-4">
        <i class="fas fa-list-alt"></i> My Vehicles
    </h2>

    {% if vehicles %}
        {% for v in vehicles %}
            <div class="vehicle-card card shadow">
                <div class="card-body row align-items-center">
                    
                    <!-- Icon -->
                    <div class="col-md-1 col-2 text-center">
                        <i class="fas fa-car-side fa-2x" style="color: #3498db;"></i>
                    </div>

                    <!-- Vehicle Name and Number -->
                    <div class="col-md-7 col-10">
                        <strong>{{ v.name }}</strong>
                        <small>License/Registration Number: {{ v.number }}</small>
                    </div>

                    <!-- Actions (Simulated) -->
                    <div class="col-md-4 col-12 text-md-end mt-3 mt-md-0">
                        <button class="btn btn-sm btn-info me-2"><i class="fas fa-edit"></i> Edit</button>
                        <button class="btn btn-sm btn-danger"><i class="fas fa-trash"></i> Delete</button>
                    </div>
                </div>
            </div>
        {% endfor %}
    {% else %}
        <div class="alert alert-info text-center">
            <i class="fas fa-info-circle"></i> No vehicles found. Please add a vehicle to start driving.
        </div>
        <div class="text-center mt-4">
            <a href="#" class="btn btn-success">
                <i class="fas fa-plus"></i> Add New Vehicle (Simulated)
            </a>
        </div>
    {% endif %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/js/all.min.js"></script>
</body>
</html>
