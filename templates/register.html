<!DOCTYPE html>
<html>
<head><title>Create Account</title>
    <!-- Load Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <!-- Load Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        /* --- General Reset & Body Styling (Consistent) --- */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 0; 
            /* Attractive Gradient Background */
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); 
            color: #ecf0f1; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        
        /* --- Main Container (Adjusted for more fields) --- */
        .container { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(5px); 
            padding: 40px; 
            border-radius: 12px; 
            max-width: 700px; /* Wider container for two columns */
            width: 90%; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); 
            text-align: left; 
        }
        
        h1 { 
            text-align: center; 
            color: #ffffff; 
            margin-bottom: 20px;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
            border-bottom: 2px solid #2ecc71;
            padding-bottom: 10px;
        }
        
        hr { 
            border: 0; 
            height: 1px; 
            background: rgba(255, 255, 255, 0.2); 
            margin: 20px 0; 
        }
        
        label { 
            display: block; 
            margin-top: 15px; 
            margin-bottom: 5px; 
            font-weight: bold; 
        }
        
        /* --- Form Control Styles --- */
        .form-control, .form-control:focus {
            background-color: rgba(255, 255, 255, 0.95); 
            color: #34495e; 
            border: 1px solid #5a74a1;
        }

        .form-control:focus {
            border-color: #2ecc71; /* Green focus color */
            outline: none;
            box-shadow: 0 0 5px rgba(46, 204, 113, 0.8);
        }
        
        /* --- Register Button --- */
        .btn-register { 
            background-color: #2ecc71; /* Emerald Green */
            box-shadow: 0 4px 0 #27ae60; 
            color: white; 
            padding: 12px 20px; 
            margin-top: 25px; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            width: 100%; 
            font-weight: bold; 
            transition: all 0.2s ease; 
        }
        
        .btn-register:hover { 
            background-color: #27ae60; 
            transform: translateY(1px);
            box-shadow: 0 3px 0 #27ae60;
        }
        
        p { 
            text-align: center; 
            margin-top: 20px; 
            font-size: 0.9em;
        }
        
        a { 
            color: #3498db; 
            text-decoration: none; 
            transition: color 0.2s ease;
        }
        a:hover {
            color: #ffffff;
            text-decoration: underline;
        }

        /* --- Flash Messages --- */
        .flash { 
            padding: 15px; 
            margin: 15px 0; 
            border-radius: 8px; 
            font-weight: bold; 
            color: #34495e; 
            text-align: left; 
            border: 1px solid transparent; 
        }
        .flash.success { background-color: #d4edda; border-color: #c3e6cb; }
        .flash.error { background-color: #f8d7da; border-color: #f5c6cb; }
    </style>
</head>
<body>
<div class="container">
    <h1><i class="fas fa-user-plus"></i> Create New Account</h1>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">
        
        <!-- ROW 1: ACCOUNT CREDENTIALS -->
        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="username"><i class="fas fa-user"></i> Username (for login):</label>
                <input type="text" id="username" name="username" class="form-control" required>
            </div>
            <div class="col-md-6 mb-3">
                <label for="password"><i class="fas fa-lock"></i> Password:</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>
        </div>
        
        <hr>
        
        <!-- ROW 2: PERSONAL INFO -->
        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="name"><i class="fas fa-id-card"></i> Your Full Name:</label>
                <input type="text" id="name" name="name" class="form-control" required>
            </div>
            <div class="col-md-6 mb-3">
                <label for="email"><i class="fas fa-envelope"></i> Email:</label>
                <input type="email" id="email" name="email" class="form-control" required>
            </div>
        </div>

        <!-- ROW 3: CONTACT & ROLE -->
        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="mobile"><i class="fas fa-phone"></i> Mobile Number:</label>
                <input type="tel" id="mobile" name="mobile" class="form-control" required>
            </div>
            
            <!-- NEW DROPDOWN FIELD: User Role -->
            <div class="col-md-6 mb-3">
                <label for="role"><i class="fas fa-user-tag"></i> User Role:</label>
                <select id="role" name="role" class="form-control" required>
                    <option value="passenger">Passenger</option>
                    <option value="driver">Driver</option>
                </select>
            </div>
        </div>

        <!-- ROW 4: ADDRESS (Full Width) -->
        <div class="mb-3">
            <label for="address"><i class="fas fa-map-marked-alt"></i> Address:</label>
            <textarea id="address" name="address" rows="2" class="form-control"></textarea>
        </div>
        
        <button type="submit" class="btn-register">
            <i class="fas fa-user-plus"></i> Register
        </button>
    </form>
    
    <p>Already have an account? <a href="{{ url_for('login') }}">Log in here</a></p>
</div>
</body>
</html>
