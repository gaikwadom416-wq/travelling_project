<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip History - Driver</title>
    <!-- Load Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <!-- Load Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        /* --- General Theme Styles (Consistent with Dashboard) --- */
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 0;
            color: #ecf0f1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            padding: 40px;
            border-radius: 12px;
            max-width: 800px;
            width: 90%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h2 {
            border-bottom: 2px solid #f39c12; /* Yellow/Accent border */
            padding-bottom: 10px;
            margin-bottom: 30px;
            color: #ffffff;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
            font-size: 2em;
        }
        
        /* --- History Card Style --- */
        .history-card {
            background: #34495e; /* Darker interior color */
            border-left: 5px solid #2ecc71; /* Green primary color */
            transition: transform 0.2s;
            margin-bottom: 20px;
            color: #ecf0f1;
        }

        .history-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.3);
        }

        .card-body strong {
            color: #bdc3c7;
            font-weight: 500;
            display: block;
            font-size: 0.9em;
        }
        
        .card-body span {
            color: #ecf0f1;
            font-size: 1.1em;
            display: block;
            margin-bottom: 8px;
        }

        .fare-amount {
            font-size: 1.5em;
            font-weight: 700;
            color: #f1c40f; /* Yellow for fare visibility */
        }
        
        /* --- Back Button Style --- */
        .btn-back-custom {
            background-color: #8e44ad !important;
            border: none;
            color: white !important;
            box-shadow: 0 4px 0 #7c3a96;
            transition: all 0.2s ease;
        }

        .btn-back-custom:hover {
            background-color: #7c3a96 !important;
            box-shadow: 0 2px 0 #7c3a96;
            transform: translateY(1px);
        }
        
        /* Route Icons */
        .route-detail {
            font-size: 1em;
            font-weight: 600;
        }
        .route-detail i {
            color: #3498db;
        }
    </style>
</head>
<body>

<div class="container py-4">
    <a href="{{ url_for('driver_dashboard') }}" class="btn btn-primary btn-back-custom mb-4">
        <i class="fas fa-arrow-left"></i> Back to Driver Dashboard
    </a>

    <h2 class="text-warning mb-4">
        <i class="fas fa-history"></i> Trip History
    </h2>

    {% if trips %}
        {% for b in trips %}
            <div class="history-card card shadow">
                <div class="card-body row align-items-center">
                    
                    <!-- ID and Date -->
                    <div class="col-md-4 col-sm-6 mb-2 mb-md-0 border-end border-secondary">
                        <strong>Booking ID:</strong>
                        <span class="mb-1">{{ b.id }}</span>
                        <strong>Date:</strong>
                        <span>{{ b.date }}</span>
                    </div>

                    <!-- Route -->
                    <div class="col-md-5 col-sm-6 mb-2 mb-md-0 border-end border-secondary">
                        <strong>Route:</strong>
                        <div class="route-detail">
                            <i class="fas fa-dot-circle"></i> {{ b.pickup }}<br>
                            <i class="fas fa-map-pin"></i> {{ b.drop_off }}
                        </div>
                    </div>

                    <!-- Fare -->
                    <div class="col-md-3 col-12 text-md-end text-center">
                        <strong>Fare:</strong>
                        <span class="fare-amount">₹{{ b.total_fare | round(2) }}</span>
                    </div>

                </div>
            </div>
        {% endfor %}
    {% else %}
        <div class="alert alert-info text-center">
            <i class="fas fa-info-circle"></i> No completed trips found yet.
        </div>
    {% endif %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/js/all.min.js"></script>
</body>
</html>
