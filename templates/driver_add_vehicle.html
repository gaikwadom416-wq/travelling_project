<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Vehicle - Driver</title>
    <!-- Load Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <!-- Load Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        /* --- General Theme Styles (Consistent with Dashboard) --- */
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center; /* Center vertically for this form */
            color: #ecf0f1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px;
        }

        .custom-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            padding: 40px;
            border-radius: 12px;
            max-width: 500px; /* Focused container size */
            width: 90%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h2 {
            border-bottom: 2px solid #f39c12; /* Yellow/Accent border */
            padding-bottom: 10px;
            margin-bottom: 30px;
            color: #ffffff;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
            font-size: 2em;
            text-align: center;
        }
        
        /* Input Field Styling */
        .form-control, .form-control:focus {
            background-color: rgba(255, 255, 255, 0.9);
            color: #34495e;
            border-color: #5a74a1;
        }
        
        .form-control:focus {
            box-shadow: 0 0 5px rgba(46, 204, 113, 0.8);
            border-color: #2ecc71; /* Green focus box shadow */
        }

        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            font-weight: bold;
            color: #ecf0f1;
        }
        
        /* --- Back Button Style --- */
        .btn-back-custom {
            background-color: #8e44ad !important;
            border: none;
            color: white !important;
            box-shadow: 0 4px 0 #7c3a96;
            transition: all 0.2s ease;
        }

        .btn-back-custom:hover {
            background-color: #7c3a96 !important;
            box-shadow: 0 2px 0 #7c3a96;
            transform: translateY(1px);
        }

        /* --- Save Button (Green) --- */
        .btn-save-custom {
            background-color: #2ecc71 !important; /* Emerald Green */
            box-shadow: 0 4px 0 #27ae60;
            color: white !important;
            padding: 12px 25px;
            margin-top: 25px;
            font-weight: bold;
            font-size: 1.1em;
            transition: all 0.2s ease;
            border: none;
        }
        .btn-save-custom:hover {
            background-color: #27ae60 !important;
            box-shadow: 0 3px 0 #27ae60;
            transform: translateY(1px);
        }

    </style>
</head>
<body>

<div class="custom-container">
    <a href="{{ url_for('driver_dashboard') }}" class="btn btn-primary btn-back-custom mb-4">
        <i class="fas fa-arrow-left"></i> Back to Dashboard
    </a>

    <h2 class="text-warning mb-4">
        <i class="fas fa-plus-circle"></i> Add Vehicle
    </h2>

    <form method="POST">
        <div class="mb-3">
            <label for="vname" class="form-label"><i class="fas fa-car me-2"></i> Vehicle Name (e.g., Toyota Camry)</label>
            <input type="text" name="vname" id="vname" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="vnumber" class="form-label"><i class="fas fa-id-card me-2"></i> Vehicle License/Registration Number</label>
            <input type="text" name="vnumber" id="vnumber" class="form-control" required>
        </div>

        <button type="submit" class="btn w-100 btn-save-custom">
            <i class="fas fa-save"></i> Save Vehicle (Simulated)
        </button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/js/all.min.js"></script>
</body>
</html>
