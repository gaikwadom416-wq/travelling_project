<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cancel Booking</title>
    <!-- Load Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <!-- Load Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        /* --- General Theme Styles (Consistent) --- */
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ecf0f1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .custom-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            padding: 40px;
            border-radius: 12px;
            max-width: 450px; /* Smaller container for focused task */
            width: 90%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: left;
        }

        h2 {
            border-bottom: 2px solid #e74c3c; /* Red/Danger color for cancellation */
            padding-bottom: 10px;
            margin-bottom: 30px;
            color: #ffffff;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
            text-align: center;
            font-size: 1.8em;
        }
        
        /* Input Field Styling */
        .form-control, .form-control:focus {
            background-color: rgba(255, 255, 255, 0.9);
            color: #34495e;
            border-color: #5a74a1;
        }
        
        .form-control:focus {
            box-shadow: 0 0 5px rgba(231, 76, 60, 0.8); /* Red focus box shadow */
            border-color: #e74c3c;
        }

        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            font-weight: bold;
            color: #ecf0f1;
        }

        /* --- Cancel Button (Red/Danger) --- */
        .btn-cancel {
            background-color: #e74c3c; /* Alizarin Red */
            box-shadow: 0 4px 0 #c0392b;
            color: white;
            padding: 12px 25px;
            margin-top: 25px;
            font-weight: bold;
            font-size: 1.1em;
            transition: all 0.2s ease;
            border: none;
        }

        .btn-cancel:hover {
            background-color: #c0392b;
            transform: translateY(1px);
            box-shadow: 0 3px 0 #c0392b;
            color: white;
        }
        
        /* --- Back Button (Amethyst Purple - matching view_all.html) --- */
        .btn-back-custom {
            background-color: #8e44ad !important;
            border: none;
            color: white !important;
            box-shadow: 0 4px 0 #7c3a96;
            transition: all 0.2s ease;
        }

        .btn-back-custom:hover {
            background-color: #7c3a96 !important;
            box-shadow: 0 2px 0 #7c3a96;
            transform: translateY(1px);
            color: white !important;
        }

    </style>
</head>
<body>
<div class="custom-container">
    <h2><i class="fas fa-times-circle"></i> Cancel Booking</h2>
    
    <!-- Flash messages section should be added here in a real app -->
    
    <form method="POST">
        <div class="mb-3">
            <label for="booking_id" class="form-label">Enter Booking ID</label>
            <input type="text" name="booking_id" id="booking_id" class="form-control" required placeholder="E.g., a7e3b5c1">
        </div>
        
        <button type="submit" class="btn w-100 btn-cancel">
            <i class="fas fa-trash-alt"></i> Confirm Cancellation
        </button>
    </form>
    
    <div class="text-center mt-4">
        <a href="{{ url_for('home') }}" class="btn btn-primary btn-back-custom">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
